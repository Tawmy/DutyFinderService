services:
  api:
    image: ghcr.io/tawmy/dutyfinderservice:0.1.0
    container_name: duty-finder-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: true
      LOGGING__LOGLEVEL__DEFAULT: Information
      LOGGING__LOGLEVEL__MICROSOFT.ASPNETCORE: Warning
      CONNECTION_STRING: Host=db;Database=duty-finder-service;Username=duty-finder-service;Password=${DB_PASSWORD};GSS Encryption Mode=Disable
      AUTH_AUDIENCE: duty-finder-service
      AUTH_AUTHORITY: https://ffxiv.id/realms/eorzea
      FFXIV_PATCH: 7.45

  db:
    image: postgres:18
    container_name: duty-finder-service-db
    restart: unless-stopped
    volumes:
      - db:/var/lib/postgresql
    environment:
      - POSTGRES_DB=duty-finder-service
      - POSTGRES_USER=duty-finder-service
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d duty-finder-service -U duty-finder-service" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db:
    name: duty-finder-service-db